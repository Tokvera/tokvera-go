name: Canonical Contract

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check canonical contract
        env:
          TOKVERA_API_BASE_URL: ${{ vars.TOKVERA_API_BASE_URL || 'https://api.tokvera.org' }}
        run: node scripts/check-canonical-contract.mjs
